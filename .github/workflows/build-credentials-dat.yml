name: Build-Credentials-DAT

on:

  workflow_dispatch:

jobs:

  build-credentials:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      # =====================================
      # CHECKOUT
      # =====================================

      - name: Checkout
        uses: actions/checkout@v4

      # =====================================
      # SETUP NODE
      # =====================================

      - name: Setup-Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # =====================================
      # INSTALL PACKAGES
      # =====================================

      - name: Install-Packages
        run: |

          npm install \
            msgpackr \
            fs-extra

      # =====================================
      # VALIDATE FILE
      # =====================================

      - name: Validate-Credentials
        run: |

          if [ ! -f credentials.json ]; then

            echo ""
            echo "================================="
            echo "credentials.json NOT FOUND"
            echo "================================="
            exit 1

          fi

      # =====================================
      # CREATE BUILDER
      # =====================================

      - name: Create-DAT-Builder
        run: |

          cat > build-credentials-dat.js << 'EOF'

          const fs =
            require("fs-extra");

          const path =
            require("path");

          const { pack } =
            require("msgpackr");

          // ==================================
          // PATHS
          // ==================================

          const INPUT =
            "./credentials.json";

          const OUTPUT =
            "./public/data";

          // ==================================
          // HELPERS
          // ==================================

          function scramble(buffer) {

            return Buffer
              .from(buffer)
              .toString("base64")
              .split("")
              .reverse()
              .join("");

          }

          function saveDat(data, output) {

            const packed =
              pack(data);

            const scrambled =
              scramble(packed);

            fs.writeFileSync(
              output,
              scrambled
            );

          }

          // ==================================
          // LOAD JSON
          // ==================================

          const credentials =
            JSON.parse(

              fs.readFileSync(
                INPUT,
                "utf8"
              )

            );

          // ==================================
          // VALIDATE
          // ==================================

          if (
            !Array.isArray(
              credentials
            )
          ) {

            throw new Error(
              "credentials.json must be array"
            );

          }

          for (
            const item of credentials
          ) {

            if (
              !item.u ||
              !item.p
            ) {

              throw new Error(
                "Invalid credential format"
              );

            }

          }

          // ==================================
          // SAVE DAT
          // ==================================

          fs.ensureDirSync(
            OUTPUT
          );

          saveDat(

            credentials,

            path.join(
              OUTPUT,
              "credentials.dat"
            )

          );

          // ==================================
          // LOG
          // ==================================

          console.log("");
          console.log("================================");
          console.log("CREDENTIALS DAT GENERATED");
          console.log("================================");
          console.log(
            "Total Credentials:",
            credentials.length
          );
          console.log("================================");

          EOF

      # =====================================
      # RUN BUILDER
      # =====================================

      - name: Run-Builder
        run: |

          node build-credentials-dat.js

      # =====================================
      # COMMIT
      # =====================================

      - name: Commit-And-Push
        run: |

          git config --global user.name \
            "github-actions[bot]"

          git config --global user.email \
            "github-actions[bot]@users.noreply.github.com"

          git add public/data/credentials.dat

          git commit -m \
            "Updated credentials.dat" \
            || echo "No changes"

          git push
