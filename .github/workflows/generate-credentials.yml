name: Generate-Monthly-Credentials

on:

  workflow_dispatch:

jobs:

  generate-credentials:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      # =====================================
      # CHECKOUT
      # =====================================

      - name: Checkout
        uses: actions/checkout@v4

      # =====================================
      # SETUP NODE
      # =====================================

      - name: Setup-Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # =====================================
      # INSTALL PACKAGES
      # =====================================

      - name: Install-Packages
        run: |

          npm install msgpackr fs-extra

      # =====================================
      # CREATE GENERATOR
      # =====================================

      - name: Create-Credential-Generator
        run: |

          cat > generate-credentials.js << 'EOF'

          const fs =
            require("fs-extra");

          const path =
            require("path");

          const { pack } =
            require("msgpackr");

          // ==================================
          // OUTPUT
          // ==================================

          const OUTPUT =
            "./public/data";

          // ==================================
          // HELPERS
          // ==================================

          function scramble(buffer) {

            return Buffer
              .from(buffer)
              .toString("base64")
              .split("")
              .reverse()
              .join("");

          }

          function saveDat(data, output) {

            const packed =
              pack(data);

            const scrambled =
              scramble(packed);

            fs.writeFileSync(
              output,
              scrambled
            );

          }

          function password(length = 14) {

            const chars =
              "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#$%^&*";

            let result = "";

            for (
              let i = 0;
              i < length;
              i++
            ) {

              result +=
                chars.charAt(
                  Math.floor(
                    Math.random() *
                    chars.length
                  )
                );

            }

            return result;

          }

          // ==================================
          // GENERATE
          // ==================================

          const credentials = [];

          for (
            let grade = 2;
            grade <= 8;
            grade++
          ) {

            for (
              let i = 1;
              i <= 50;
              i++
            ) {

              const id =
                String(i)
                  .padStart(3, "0");

              credentials.push({

                u:
                  `vidhwaan${grade}${id}`,

                p:
                  password(14)

              });

            }

          }

          // ==================================
          // SAVE JSON
          // ==================================

          fs.writeFileSync(

            "./credentials.json",

            JSON.stringify(
              credentials,
              null,
              2
            )

          );

          // ==================================
          // SAVE DAT
          // ==================================

          fs.ensureDirSync(
            OUTPUT
          );

          saveDat(

            credentials,

            path.join(
              OUTPUT,
              "credentials.dat"
            )

          );

          // ==================================
          // LOG
          // ==================================

          console.log("");
          console.log("================================");
          console.log("NEW MONTHLY CREDENTIALS CREATED");
          console.log("================================");
          console.log(
            "Total:",
            credentials.length
          );
          console.log("================================");

          EOF

      # =====================================
      # RUN GENERATOR
      # =====================================

      - name: Run-Generator
        run: |

          node generate-credentials.js

      # =====================================
      # COMMIT
      # =====================================

      - name: Commit-And-Push
        run: |

          git config --global user.name \
            "github-actions[bot]"

          git config --global user.email \
            "github-actions[bot]@users.noreply.github.com"

          git add credentials.json
          git add public/data/credentials.dat

          git commit -m \
            "Generated monthly credentials" \
            || echo "No changes"

          git push
