<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1,
      viewport-fit=cover
    "
  />

  <title>
    Install App
  </title>

  <meta
    name="theme-color"
    content="#07111f"
  />

  <link
    rel="manifest"
    href="./manifest.json"
  />

  <style>

    * {

      margin:
        0;

      padding:
        0;

      box-sizing:
        border-box;

    }

    body {

      width:
        100%;

      min-height:
        100vh;

      display:
        flex;

      align-items:
        center;

      justify-content:
        center;

      background:

        linear-gradient(
          180deg,
          #07111f,
          #0d1730
        );

      color:
        white;

      font-family:
        Inter,
        sans-serif;

      overflow:
        hidden;

    }

    .installBox {

      text-align:
        center;

      padding:
        30px;

      width:
        100%;

      max-width:
        420px;

    }

    .logo {

      width:
        110px;

      height:
        110px;

      object-fit:
        contain;

      margin-bottom:
        24px;

      animation:
        floatLogo 2.2s ease infinite;

    }

    @keyframes floatLogo {

      0% {

        transform:
          translateY(0px);

      }

      50% {

        transform:
          translateY(-8px);

      }

      100% {

        transform:
          translateY(0px);

      }

    }

    h1 {

      font-size:
        2rem;

      font-weight:
        900;

      margin-bottom:
        14px;

    }

    p {

      color:
        rgba(255,255,255,0.7);

      line-height:
        1.8;

      margin-bottom:
        34px;

      font-size:
        1rem;

    }

    #installButton {

      border:
        none;

      outline:
        none;

      cursor:
        pointer;

      width:
        100%;

      padding:
        18px;

      border-radius:
        22px;

      background:

        linear-gradient(
          135deg,
          #4fdcff,
          #4f8cff
        );

      color:
        white;

      font-size:
        1rem;

      font-weight:
        900;

      box-shadow:
        0 18px 40px rgba(79,140,255,0.28);

      transition:
        0.25s ease;

      display:
        none;

    }

    #installButton.show {

      display:
        block;

    }

    #installButton:active {

      transform:
        scale(0.98);

    }

    .loading {

      width:
        64px;

      height:
        64px;

      border-radius:
        999px;

      border:
        5px solid rgba(255,255,255,0.08);

      border-top:
        5px solid #4fdcff;

      margin:
        0 auto 34px;

      animation:
        spin 1s linear infinite;

    }

    @keyframes spin {

      from {

        transform:
          rotate(0deg);

      }

      to {

        transform:
          rotate(360deg);

      }

    }

  </style>

</head>

<body>

  <div class="installBox">

    <img
      src="./icons/icon-192.png"
      class="logo"
    />

    <div
      class="loading"
      id="loader"
    ></div>

    <h1>
      Install App
    </h1>

    <p>
      Experience the next generation app experience.
    </p>

    <button id="installButton">

      Install App

    </button>

  </div>

  <script>

    let deferredPrompt = null;

    const installButton =

      document.getElementById(
        "installButton"
      );

    const loader =

      document.getElementById(
        "loader"
      );

    /* =====================================
       INSTALL AVAILABLE
    ===================================== */

    window.addEventListener(

      "beforeinstallprompt",

      event => {

        event.preventDefault();

        deferredPrompt = event;

        loader.style.display =
          "none";

        installButton.classList.add(
          "show"
        );

      }

    );

    /* =====================================
       INSTALL CLICK
    ===================================== */

    installButton.addEventListener(

      "click",

      async () => {

        if (
          !deferredPrompt
        ) {

          window.location.href =
            "/";

          return;

        }

        deferredPrompt.prompt();

        const result =

          await deferredPrompt.userChoice;

        /* ===============================
           INSTALLED
        =============================== */

        if (
          result.outcome ===
          "accepted"
        ) {

          installButton.innerHTML =

            "Installed ✨";

          setTimeout(() => {

            window.close();

          }, 1200);

        }

      }

    );

    /* =====================================
       FALLBACK
    ===================================== */

    setTimeout(() => {

      if (
        !deferredPrompt
      ) {

        loader.style.display =
          "none";

        installButton.classList.add(
          "show"
        );

      }

    }, 2500);

  </script>

</body>

</html>
